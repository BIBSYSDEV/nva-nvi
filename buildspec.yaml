version: 0.2

env:
  variables:
    #    GRADLE_USER_HOME: "/root/.gradle"
    GRADLE_OPTS: "-Dorg.gradle.configuration-cache=false"
    SAM_CLI_TELEMETRY: "0"
  secrets-manager:
    DOCKER_HUB_USERNAME: DockerHubCredentials:DockerHubUsername
    DOCKER_HUB_SECRET: DockerHubCredentials:DockerHubSecret

#cache:
#  paths:
#    - "/root/.gradle/caches/**/*"

phases:
  install:
    runtime-versions:
      java: corretto21

    commands:
      - pip3 install --upgrade "aws-sam-cli==1.160.1"
      - sam --version
      # Phase metric: gradle bootstrap. Wrapper downloads gradle 9.4.1 distribution
      # and resolves all build-script plugins. No project-level work.
      - time ./gradlew help --console=plain

  pre_build:
    commands:
      # We need to be logged in to Docker Hub to pull images for testcontainers
      - echo "Logging in to Docker Hub..."
      - echo -n "$DOCKER_HUB_SECRET" | docker login --username $DOCKER_HUB_USERNAME --password-stdin
      # Phase metric: compile main + test sources across all subprojects.
      # --refresh-dependencies forces fresh dep downloads, so all network cost
      # for resolving the project is paid here, isolated from compile/test cost.
      - time ./gradlew testClasses --refresh-dependencies --console=plain

  build:
    commands:
      - echo "=== Pre-build environment ==="
      - df -h
      - free -m
      - nproc
      - du -sh /root/.gradle/caches 2>/dev/null || echo "no gradle cache"
      - docker info 2>&1 | head -20
      # Phase metric: tests + lambda packaging (compile is already cached from PRE_BUILD).
      - echo "=== Step: gradle test ==="
      - time ./gradlew test --console=plain
      - echo "=== Step: sam build ==="
      # Background sampler so the silent gradle invocation inside lambda-builders
      # stays observable. Logs CPU/network/cache state every 15s.
      - |
        (
          while sleep 15; do
            echo "----- STATS $(date '+%H:%M:%S') -----"
            echo "load: $(cat /proc/loadavg)"
            ps -eo pid,pcpu,pmem,etime,comm --sort=-pcpu | head -8
            ss -tn state established 2>/dev/null | head -10 || true
            du -sh /root/.gradle/caches 2>/dev/null || true
          done
        ) &
        STATS_PID=$!
        time sam build --debug
        kill $STATS_PID 2>/dev/null || true
      - echo "=== Post-build environment ==="
      - df -h
      - du -sh .aws-sam 2>/dev/null || true
      - du -sh /root/.gradle/caches 2>/dev/null || true

  post_build:
    commands:
      - sam package --s3-bucket $S3_BUCKET --output-template-file packaged_raw.yaml
      # Use timestamp to force update of ApiGatewayCreateDeploymentCustomResource
      - BUILD_TIMESTAMP=$(date '+%s')
      - envsubst '${BUILD_TIMESTAMP}' < packaged_raw.yaml > packaged.yaml

artifacts:
  files:
    - packaged.yaml
