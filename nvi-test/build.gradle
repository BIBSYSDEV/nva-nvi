plugins {
    id 'nva.nvi.java-conventions'
}

dependencies {
    api(nvaCatalog.jackson.annotations)
    api(nvaCatalog.jackson.core)
    api(nvaCatalog.jackson.databind)
    api(nvaLibs.auth)
    api(nvaLibs.identifiers)
    api(nvaLibs.json)
    implementation(nvaCatalog.datafaker)
    implementation(nvaCatalog.slf4j.api)
    implementation(nvaLibs.core)
    implementation(nvaLibs.testutils)
    runtimeOnly(nvaCatalog.junit.jupiter.engine)
    runtimeOnly(nvaCatalog.junit.platform.launcher)
    testFixturesAnnotationProcessor(nvaCatalog.errorprone)
}

test {
    useJUnitPlatform()
    environment("LOG_LEVEL", "debug")
}
